name: ResumeForge
options:
  bundleIdPrefix: com.resumeforge
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  defaultConfig: Debug
  xcodeVersion: "16.0"
  usesTabs: false
  indentWidth: 4
  tabWidth: 4
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    SWIFT_STRICT_CONCURRENCY: complete

targets:
  ResumeForge:
    type: application
    platform: [iOS, macOS]
    deploymentTarget:
      iOS: "17.0"
      macOS: "14.0"
    sources:
      - path: ResumeForge
        excludes:
          - Tests/**
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.resumeforge.app
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_FILE: ResumeForge/App/Info.plist
        SWIFT_EMIT_LOC_STRINGS: YES
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""

  ResumeForgeTests:
    type: bundle.unit-test
    platform: [iOS, macOS]
    deploymentTarget:
      iOS: "17.0"
      macOS: "14.0"
    sources:
      - path: ResumeForge/Tests
    dependencies:
      - target: ResumeForge_iOS
        platformFilter: ios
      - target: ResumeForge_macOS
        platformFilter: macos
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.resumeforge.tests

schemes:
  ResumeForge:
    build:
      targets:
        ResumeForge_iOS: all
        ResumeForge_macOS: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - ResumeForgeTests_iOS
        - ResumeForgeTests_macOS
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
